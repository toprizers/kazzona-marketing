name: Deploy

on:
  push:
    branches: [main]

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build verification
        run: npm run build

      - name: Notify deploy success
        if: success()
        run: echo "Build verified. Hostinger auto-deploys on push to main."

      - name: Notify deploy failure
        if: failure()
        run: echo "Build failed. Deployment blocked."
